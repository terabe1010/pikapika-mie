<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積りシミュレーション</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<header class="header">
  <img src="img/h_logo.svg" class="logo">
  <h1>簡単1分 見積りシミュレーション</h1>
</header>

<h2>料金タイプ</h2>
<select id="type">
  <option value="empty">空室</option>
  <option value="live">在宅</option>
</select>

<h2>クリーニング箇所</h2>
<div class="grid">

<div class="card" data-name="浴室" data-empty="8000" data-live="9000">
  <img src="img/bath.jpg"><p>浴室</p>
</div>

<div class="card" data-name="キッチン" data-empty="10000" data-live="11000">
  <img src="img/kitchen.png"><p>キッチン</p>
</div>

<div class="card" data-name="レンジフード" data-empty="15000" data-live="16000">
  <img src="img/rangefood.png"><p>レンジフード</p>
</div>

<div class="card" data-name="トイレ" data-empty="7000" data-live="7000">
  <img src="img/toilet.png"><p>トイレ</p>
</div>

<div class="card" data-name="洗面台" data-empty="7000" data-live="7500">
  <img src="img/basin.png"><p>洗面台</p>
</div>

<div class="card" data-name="エアコン" data-empty="10000" data-live="10000">
  <img src="img/aircon.jpg"><p>エアコン</p>
</div>

<div class="card set" data-name="水回りセット" data-empty="35000" data-live="35000">
  <p>水回りセット（お得）</p>
</div>

</div>

<h2>エアコン台数</h2>
<input type="number" id="qty" value="1" min="1">

<div id="liveTotalBox">
現在の合計：<span id="liveTotal">0円</span>
</div>

<h2>お客様情報</h2>
<div class="flex">
  <input type="text" id="name" placeholder="お名前">
  <input type="text" id="tel" placeholder="電話番号">
  <input type="text" id="address" placeholder="ご住所">
</div>

<button id="createBtn">見積り作成</button>

<div id="preview"></div>

<button onclick="printEstimate()">PDFダウンロード</button>

<h2>料金表</h2>
<img src="img/price.png" style="width:100%;">

<script src="js/script.js"></script>
</body>
</html>
